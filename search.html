<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章查詢｜木木人 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #1A1A2E;
  --gold:   #C9A84C;
  --gold-lt:#E8D5A3;
  --paper:  #F5F0E8;
  --cream:  #EDE7DB;
  --sage:   #6B7C6E;
  --border: #D4C5A0;
  --white:  #FFFFFF;
  --shadow: rgba(26,26,46,0.10);
  --red:    #DC2626;
  --green:  #059669;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* ── Header ── */
header {
  background: var(--ink);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 3px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-bar { width: 4px; height: 28px; background: var(--gold); border-radius: 2px; }
header h1 { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--gold-lt); letter-spacing: 0.05em; }
header a  { margin-left: auto; font-size: 12px; color: var(--gold); text-decoration: none; opacity: 0.8; }
header a:hover { opacity: 1; }

/* ── Search Bar ── */
.search-wrap {
  background: var(--ink);
  padding: 20px 32px 24px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}

.search-row {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.search-main {
  position: relative;
}

.search-main input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 8px;
  padding: 12px 16px 12px 44px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  color: var(--gold-lt);
  outline: none;
  transition: border-color 0.2s;
}
.search-main input::placeholder { color: rgba(232,213,163,0.35); }
.search-main input:focus { border-color: var(--gold); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  pointer-events: none;
}

.filter-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-row select,
.filter-row input[type="date"] {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  color: var(--gold-lt);
  outline: none;
  cursor: pointer;
}
.filter-row select option { background: #1A1A2E; }
.filter-row select:focus,
.filter-row input[type="date"]:focus { border-color: var(--gold); }

.mode-btns { display: flex; gap: 6px; }
.mode-btn {
  padding: 7px 14px;
  border-radius: 100px;
  border: 1px solid rgba(201,168,76,0.3);
  background: transparent;
  color: rgba(232,213,163,0.6);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: 700; }
.mode-btn:not(.active):hover { border-color: var(--gold); color: var(--gold-lt); }

.result-count {
  font-size: 12px;
  color: rgba(232,213,163,0.45);
  white-space: nowrap;
}

.search-btn {
  padding: 8px 22px;
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: 6px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  margin-left: auto;
}
.search-btn:hover { background: #b8973b; }

/* ── Results ── */
.results-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 32px 48px;
}

.loading { text-align: center; padding: 60px 0; color: var(--sage); font-size: 14px; }
.empty   { text-align: center; padding: 60px 0; color: var(--sage); font-size: 14px; }

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  box-shadow: 0 2px 8px var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.card:hover { box-shadow: 0 4px 16px rgba(26,26,46,0.15); border-color: var(--gold); }

.card-top { display: flex; align-items: center; gap: 8px; }

.mode-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.mode-badge.summary { background: rgba(201,168,76,0.15); color: #8A6D20; border: 1px solid rgba(201,168,76,0.3); }
.mode-badge.full    { background: rgba(26,26,46,0.08);   color: var(--ink); border: 1px solid var(--border); }

.card-date   { font-size: 11px; color: var(--sage); margin-left: auto; white-space: nowrap; }
.card-source { font-size: 12px; color: var(--gold); font-weight: 700; letter-spacing: 0.03em; }

.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.5;
}

.card-body {
  font-size: 12px;
  color: var(--sage);
  line-height: 1.75;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }

.card-link {
  font-size: 11px;
  color: var(--gold);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 220px;
}
.card-link:hover { text-decoration: underline; }

.card-orig {
  font-size: 11px;
  color: #B0A28A;
  font-style: italic;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

@media (max-width: 600px) {
  .search-wrap { padding: 16px 16px 20px; }
  .results-wrap { padding: 16px 16px 32px; }
  .filter-row { gap: 8px; }
}

.card { cursor: pointer; }
.card:hover .card-title { color: var(--gold); }

/* ── Modal ── */
#modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-box {
  background: var(--white);
  border-radius: 12px;
  max-width: 580px; width: 100%;
  max-height: 92vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-header {
  background: var(--ink);
  padding: 13px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-radius: 12px 12px 0 0;
  border-bottom: 2px solid var(--gold);
  position: sticky; top: 0;
}
.modal-header span { font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--gold-lt); }
.modal-close { background: none; border: none; color: rgba(232,213,163,0.5); font-size: 20px; cursor: pointer; padding: 0 6px; line-height: 1; border-radius: 4px; }
.modal-close:hover { color: var(--gold); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-source { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 0.03em; }
.modal-title-text { font-family: 'Noto Serif TC', serif; font-size: 17px; color: var(--ink); line-height: 1.55; margin-top: 4px; }
.modal-orig-text { font-size: 11px; color: var(--sage); font-style: italic; margin-top: 3px; }
#modal-preview { text-align: center; background: var(--paper); border-radius: 8px; padding: 14px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
#modal-loading { color: var(--sage); font-size: 13px; }
#modal-img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); display: none; }
.modal-actions { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; padding: 11px; border-radius: 8px; border: none;
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity 0.2s, background 0.2s;
}
.modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.modal-btn-gold { background: var(--gold); color: var(--ink); font-weight: 700; }
.modal-btn-gold:hover:not(:disabled) { background: #b8973b; }
.modal-btn-outline { background: var(--cream); color: var(--sage); border: 1px solid var(--border); }
.modal-btn-outline:hover { background: var(--border); }
#modal-status { font-size: 12px; text-align: center; min-height: 16px; }
#modal-status.ok   { color: #059669; }
#modal-status.err  { color: #DC2626; }
#modal-status.info { color: #8a6d20; }

/* ── Pagination ── */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 0 4px; flex-wrap: wrap; }
.page-btn {
  min-width: 36px; height: 36px; padding: 0 12px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--white); color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; justify-content: center;
}
.page-btn.active { background: var(--ink); color: var(--gold-lt); border-color: var(--ink); font-weight: 700; }
.page-btn:hover:not(.active):not([disabled]) { border-color: var(--gold); color: var(--gold); }
.page-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
.page-info { font-size: 12px; color: var(--sage); padding: 0 6px; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="logo-bar"></div>
  <h1>木木人 AI｜文章查詢</h1>
  <a href="/">← 回主頁</a>
</header>

<div class="search-wrap">

    </div>
    <div class="filter-row">
      <select id="fSource">
        <option value="">所有來源</option>
      </select>
      <input type="date" id="fFrom" title="開始日期">
      <span style="color:rgba(232,213,163,0.4);font-size:12px;">至</span>

      <button class="search-btn" onclick="doSearch()">🔍 查詢</button>
      <span class="result-count" id="resultCount"></span>
    </div>
  </div>
</div>

<div class="results-wrap">
  <div id="output"><div class="loading">載入中…</div></div>
  <div class="pagination" id="pagination"></div>
</div>

let allData      = [];
let filteredData = [];
let currentList  = [];

const PAGE_SIZE  = 30;

async function loadData() {
  try {
    const resp = await fetch('/api/sheets');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const raw = await resp.json();
    const normalized = raw.map(row => {
      const n = {};
      for (const [k, v] of Object.entries(row)) n[k.trim()] = v;
      return n;
    });
    // 依標題+文章日期去重，合併 abstract 和 keyPoints
    allData = mergeByTitle(normalized);
    buildSourceOptions();
    document.getElementById('output').innerHTML =
      `<div class="empty">資料庫共 ${allData.length} 篇<br>請輸入關鍵字或選擇條件開始查詢</div>`;
  } catch (e) {
    document.getElementById('output').innerHTML =
      `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

// 依標題+文章日期合併重複記錄（舊版 full/summary 各存一筆 → 合成一筆）
function mergeByTitle(data) {
  const map = new Map();
  for (const r of data) {
    const title = r['中文標題'] || '';
    const adate = String(r['文章日期'] || '').slice(0, 10);
    const key   = title + '|' + adate;
    const body  = r['摘要'] || '';
    const mode  = r['模式'] || '';
    const isFull = mode.includes('full') || mode.includes('全文');

    if (!map.has(key)) {
      map.set(key, { ...r, _abstract: '', _keyPointsRaw: '' });
    }
    const entry = map.get(key);

    if (body.includes('\n\n---\n')) {
      // 新版 'both' 格式：abstract\n\n---\nkeyPoints
      const [a, k] = body.split('\n\n---\n');
      if (!entry._abstract)     entry._abstract     = a.trim();
      if (!entry._keyPointsRaw) entry._keyPointsRaw = k.trim();
    } else if (isFull) {
      entry._abstract = entry._abstract || body;
    } else if (/^\d+\./.test(body.trim())) {
      entry._keyPointsRaw = entry._keyPointsRaw || body;
    } else {
      entry._abstract = entry._abstract || body;
    }

    // 保留最新傳送時間的記錄為主記錄
    if (r['傳送時間'] > (entry['傳送時間'] || '')) {
      const saved = { _abstract: entry._abstract, _keyPointsRaw: entry._keyPointsRaw };
      Object.assign(entry, r, saved);
    }
  }
  return [...map.values()];
}

function buildSourceOptions() {
  const sources = [...new Set(allData.map(r => r['來源'] || r['source'] || '').filter(Boolean))].sort();
  const sel = document.getElementById('fSource');
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// 按鈕觸發：無條件時顯示全部
function doSearch() {
  const q    = document.getElementById('q').value.trim().toLowerCase();
  const src  = document.getElementById('fSource').value;
  const from = document.getElementById('fFrom').value;
  const to   = document.getElementById('fTo').value;
  if (!q && !src && !from && !to) {
    renderResults(allData);
    return;
  }
  onFilter();
}

function onFilter() {
  const q    = document.getElementById('q').value.trim().toLowerCase();
  const src  = document.getElementById('fSource').value;
  const from = document.getElementById('fFrom').value;
  const to   = document.getElementById('fTo').value;

  if (!q && !src && !from && !to) {
    document.getElementById('output').innerHTML =
      `<div class="empty">資料庫共 ${allData.length} 篇<br>請輸入關鍵字或選擇條件開始查詢</div>`;
    document.getElementById('resultCount').textContent = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const filtered = allData.filter(r => {
    const title  = (r['中文標題']  || '').toLowerCase();
    const orig   = (r['英文標題']  || '').toLowerCase();
    const source = (r['來源']      || '');
    const body   = ((r['_abstract'] || '') + ' ' + (r['_keyPointsRaw'] || '') + ' ' + (r['摘要'] || '')).toLowerCase();
    const date   = String(r['文章日期'] || '').slice(0, 10);

    if (q && !title.includes(q) && !orig.includes(q) && !body.includes(q) && !source.toLowerCase().includes(q)) return false;
    if (src && source !== src) return false;
    if (from && date && date < from) return false;
    if (to   && date && date > to)   return false;
    return true;
  });

  renderResults(filtered);
}

function renderResults(list) {
  filteredData = list;
  currentList  = list;
  currentPage  = 1;
  document.getElementById('resultCount').textContent = `共 ${list.length} 筆`;
  renderCurrentPage();
}

function renderCurrentPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = currentList.slice(start, start + PAGE_SIZE);

  if (!currentList.length) {
    document.getElementById('output').innerHTML = '<div class="empty">找不到符合的文章</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('output').innerHTML = `<div class="results-grid">${page.map((r, i) => {
    const idx    = start + i;
    const title  = r['中文標題']   || '（無標題）';
    const orig   = r['英文標題']   || '';
    const source = r['來源']       || '';
    const date   = String(r['文章日期'] || '').slice(0, 10);
    const body   = r['_abstract'] || r['_keyPointsRaw'] || r['摘要'] || '';
    const url    = r['連結'] || r[''] || '';
    const sent   = String(r['傳送時間'] || '');

    const urlHtml = url
      ? `<a class="card-link" href="${url.startsWith('http') ? url : 'https://doi.org/' + url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 原文連結</a>`
      : '<span></span>';

    return `
    <div class="card" onclick="openModal(${idx})">
      <div class="card-top">
        <span class="mode-badge summary">摘要＋全文</span>
        <span class="card-date">${sent.slice(0,16)}</span>
      </div>
      ${source ? `<div class="card-source">${source}</div>` : ''}
      <div class="card-title">${title}</div>
      ${orig ? `<div class="card-orig">${orig}</div>` : ''}
      ${body ? `<div class="card-body">${body.replace(/\n/g,'<br>')}</div>` : ''}
      <div class="card-footer">
        ${urlHtml}
        <span style="font-size:11px;color:#B0A28A;">${date}</span>
      </div>
    </div>`;
  }).join('')}</div>`;

  renderPagination(currentList.length);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="page-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>«</button>
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ 上頁</button>
    <span class="page-info">第 ${currentPage} / ${totalPages} 頁（共 ${total} 筆）</span>
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>下頁 ›</button>
    <button class="page-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>
  `;
}

function goPage(p) {
  currentPage = p;
  renderCurrentPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadData();

function wrapText(ctx, text, maxW) {
  if (!text) return [];
  const lines = [];
  let cur = '';
  let i = 0;
  const str = String(text);
  while (i < str.length) {
    const ch = str[i];
    if (/[A-Za-z0-9]/.test(ch)) {
      let word = '';
      while (i < str.length && /[A-Za-z0-9\-_'.]/.test(str[i])) word += str[i++];
      const test = cur + word;
      if (ctx.measureText(test).width <= maxW) {
        cur = test;
      } else {
        if (cur) lines.push(cur);
        cur = word;
      }
    } else {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) {
        lines.push(cur);
        cur = ch === ' ' ? '' : ch;
      } else {
        cur = test;
      }
      i++;
    }
  }
  if (cur.trim()) lines.push(cur);
  return lines;
}

function extractRecord(r) {
  // 優先使用合併後的 _abstract / _keyPointsRaw；否則解析原始 body
  let abstractText    = r['_abstract']     || '';
  let keyPointsRaw    = r['_keyPointsRaw'] || '';

  if (!abstractText && !keyPointsRaw) {
    const body = r['摘要'] || '';
    if (body.includes('\n\n---\n')) {
      const [a, k] = body.split('\n\n---\n');
      abstractText = a.trim();
      keyPointsRaw = k.trim();
    } else if (/^\d+\./.test(body.trim())) {
      keyPointsRaw = body;
    } else {
      abstractText = body;
    }
  }

  const keyPoints = keyPointsRaw
    ? keyPointsRaw.split('\n').map(l => l.trim()).filter(Boolean).map(l => l.replace(/^\d+\.\s*/, ''))
    : [];

  const date = String(r['文章日期'] || '').slice(0, 10);
  return {
    titleZh:   r['中文標題']  || '',
    titleOrig: r['英文標題']  || '',
    source:    r['來源']      || '',
    date,
    abstract:  abstractText,
    keyPoints, editorial: '',
    url: r['連結'] || r[''] || '',
  };
}

async function openModal(idx) {
  const r = filteredData[idx];
  if (!r) return;
  modalRecord = r; modalJpegUrlSummary = null; modalJpegUrlFull = null;
  const d = extractRecord(r);
  document.getElementById('modal-source').textContent = d.source;
  document.getElementById('modal-date-text').textContent = (r['傳送時間'] || '').slice(0, 16);
  document.getElementById('modal-title').textContent  = d.titleZh || '（無標題）';
  document.getElementById('modal-orig').textContent   = d.titleOrig || '';
  document.getElementById('modal-dual').style.display    = 'none';
  document.getElementById('modal-loading').style.display = 'block';
  document.getElementById('modal-send-btn').disabled  = true;
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal-status').className   = '';
  document.getElementById('modal').style.display      = 'flex';
  document.body.style.overflow = 'hidden';
  try {
    const [summaryUrl, fullUrl] = await Promise.all([
      genSummaryJpeg(d),
      genFullJpeg(d),
    ]);
    modalJpegUrlSummary = summaryUrl;
    modalJpegUrlFull    = fullUrl;
    document.getElementById('modal-img-summary').src = summaryUrl;
    document.getElementById('modal-img-full').src    = fullUrl;
    document.getElementById('modal-loading').style.display = 'none';
    document.getElementById('modal-dual').style.display    = 'block';
    document.getElementById('modal-send-btn').disabled     = false;
  } catch(e) {
    document.getElementById('modal-loading').textContent = '⚠ JPEG 產生失敗：' + e.message;
  }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
  modalJpegUrlSummary = null; modalJpegUrlFull = null; modalRecord = null;
}

async function modalSendLine() {
  if (!modalJpegUrlSummary || !modalJpegUrlFull) return;
  const btn = document.getElementById('modal-send-btn');
  const st  = document.getElementById('modal-status');
  btn.disabled = true;
  st.textContent = '傳送中（兩張）…'; st.className = 'info';
  try {
    const d = extractRecord(modalRecord);
    const resp = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageSummaryBase64: modalJpegUrlSummary.split(',')[1],
        imageFullBase64:    modalJpegUrlFull.split(',')[1],
        mimeType: 'image/jpeg',
        mode: 'both', title: d.titleZh, titleZh: d.titleZh,
        titleOrig: d.titleOrig, source: d.source, date: d.date,
        abstract: d.abstract, keyPoints: d.keyPoints, editorial: d.editorial, url: d.url,
      }),
    });
    const result = await resp.json();
    if (!resp.ok) throw new Error(result.error || `HTTP ${resp.status}`);
    st.textContent = '已成功傳送至 LINE ✓'; st.className = 'ok';
  } catch(e) {
    st.textContent = '傳送失敗：' + e.message; st.className = 'err';
    btn.disabled = false;
  }
}

/* ── Canvas palettes ── */
const C = { ink:'#1A1A2E', gold:'#C9A84C', paper:'#FBF7F1', sage:'#6B7C6E', rule:'#D4C5A0', footer:'#8A7A50' };
const F = { navy:'#1C2432', ivory:'#FAF7F2', gold:'#B6935A', text:'#1A1A28', grey:'#6C7480', white:'#F8F4EE', ftxt:'#9B9180' };

async function genSummaryJpeg(d) {
  await loadCanvasFonts();
  const SW = 1080, SM = 72, cw = SW - SM * 2;
  const HDR = 110, FTR = 70, CIRC_D = 44;
  const tmp = document.createElement('canvas');
  tmp.width = SW; tmp.height = 4000;
  const tc = tmp.getContext('2d');
  const wt = (text, maxW, fStr) => { tc.font = fStr; return wrapText(tc, text, maxW); };
  const F_TITLE = '700 52px "Noto Serif TC", serif';
  const F_EN    = '400 20px "Noto Sans TC", sans-serif';
  const F_PT    = '400 28px "Noto Sans TC", sans-serif';
  const F_SMALL = '400 17px "Noto Sans TC", sans-serif';
  const titleLines  = wt(d.titleZh || '（無標題）', cw, F_TITLE);
  const enLines     = (d.titleOrig && d.titleOrig !== d.titleZh) ? wt(d.titleOrig, cw, F_EN) : [];
  const points      = (d.keyPoints || []).slice(0, 5);
  const ptLinesList = points.map(pt => wt(pt, cw - CIRC_D - 18, F_PT));
  const edLines     = d.editorial ? wt(d.editorial, cw - 24, F_SMALL) : [];
  let contentH = 28 + 38 + 72 + titleLines.length * 68 - 16;
  contentH += enLines.length > 0 ? enLines.length * 28 + 14 : 0;
  contentH += 30;
  for (const ptl of ptLinesList) contentH += Math.max(ptl.length * 38 + 4, CIRC_D) + 22;
  contentH += edLines.length > 0 ? edLines.length * 24 + 24 : 0;
  contentH += 20;
  const SH = Math.max(HDR + contentH + FTR, 560);
  const canvas = document.getElementById('canvas');
  canvas.width = SW; canvas.height = SH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = F.ivory; ctx.fillRect(0, 0, SW, SH);
  ctx.fillStyle = F.navy;  ctx.fillRect(0, 0, SW, HDR);
  ctx.fillStyle = F.gold;  ctx.fillRect(0, HDR - 3, SW, 3);
  ctx.font = '700 26px "Noto Sans TC", sans-serif'; ctx.fillStyle = F.white;
  ctx.fillText(d.source || '木木人分享', SM, 44);
  if (d.date) { ctx.font = F_SMALL; ctx.fillStyle = F.ftxt; ctx.fillText('文章日期：' + d.date, SM, 78); }
  let y = HDR + 28;
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  const tagText = '重點摘要', tagTW = ctx.measureText(tagText).width + 36, tagH = 38, tr = 19;
  ctx.fillStyle = F.gold;
  ctx.beginPath();
  ctx.moveTo(SM+tr,y); ctx.lineTo(SM+tagTW-tr,y); ctx.quadraticCurveTo(SM+tagTW,y,SM+tagTW,y+tr);
  ctx.lineTo(SM+tagTW,y+tagH-tr); ctx.quadraticCurveTo(SM+tagTW,y+tagH,SM+tagTW-tr,y+tagH);
  ctx.lineTo(SM+tr,y+tagH); ctx.quadraticCurveTo(SM,y+tagH,SM,y+tagH-tr);
  ctx.lineTo(SM,y+tr); ctx.quadraticCurveTo(SM,y,SM+tr,y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = F.navy; ctx.fillText(tagText, SM+18, y+27);
  y += tagH + 72;
  ctx.font = F_TITLE; ctx.fillStyle = F.text;
  for (let i = 0; i < titleLines.length; i++) { ctx.fillText(titleLines[i], SM, y); if (i < titleLines.length-1) y += 68; }
  y += 52;
  if (enLines.length > 0) { ctx.font = F_EN; ctx.fillStyle = F.grey; for (const ln of enLines) { ctx.fillText(ln, SM, y); y += 28; } y += 14; }
  ctx.strokeStyle = F.gold; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(SM,y); ctx.lineTo(SW-SM,y); ctx.stroke(); y += 30;
  for (let i = 0; i < ptLinesList.length; i++) {
    const ptl = ptLinesList[i], cy = y;
    ctx.fillStyle = F.navy; ctx.beginPath(); ctx.arc(SM+CIRC_D/2, cy+CIRC_D/2, CIRC_D/2, 0, Math.PI*2); ctx.fill();
    ctx.font = '700 17px "Noto Sans TC", sans-serif'; ctx.fillStyle = F.white;
    const ns = String(i+1), nw = ctx.measureText(ns).width;
    ctx.fillText(ns, SM+CIRC_D/2-nw/2, cy+CIRC_D/2+7);
    ctx.font = F_PT; ctx.fillStyle = F.text;
    let ty = cy + 8;
    for (const ln of ptl) { ctx.fillText(ln, SM+CIRC_D+18, ty+28); ty += 38; }
    y += Math.max(ty-cy, CIRC_D+6) + 22;
  }
  y += 8;
  if (edLines.length > 0) {
    const barH = edLines.length * 24 + 20;
    ctx.fillStyle = F.gold; ctx.fillRect(SM, y, 3, barH);
    ctx.font = F_SMALL; ctx.fillStyle = F.grey;
    let qy = y + 14; for (const ln of edLines) { ctx.fillText(ln, SM+18, qy); qy += 24; }
    y += barH + 20;
  }
  const fy = SH - FTR;
  ctx.fillStyle = F.navy; ctx.fillRect(0, fy, SW, FTR);
  ctx.fillStyle = F.gold; ctx.fillRect(0, fy, SW, 3);
  if (d.url) { const du = d.url.length > 72 ? d.url.slice(0,72)+'…' : d.url; ctx.font = F_SMALL; ctx.fillStyle = F.ftxt; ctx.fillText(du, SM, fy+28); }
  const _ms1 = '木木人 分享';
  ctx.font = '500 14px "Noto Sans TC", sans-serif'; ctx.fillStyle = '#E8C87A';
  ctx.fillText(_ms1, SW - SM - LOGO_W - 18 - ctx.measureText(_ms1).width, fy + Math.round(FTR / 2) + 6);
  ctx.save(); ctx.filter = 'brightness(1.25) saturate(1.1)';
  ctx.drawImage(LOGO_IMG, SW - SM - LOGO_W, fy + Math.round((FTR - LOGO_H) / 2), LOGO_W, LOGO_H);
  ctx.restore();
  return canvas.toDataURL('image/jpeg', 0.92);
}

async function genFullJpeg(d) {
  await loadCanvasFonts();
  const HDR = 96, FTR = 80;
  const TITLE_SZ = 56, TITLE_LH = 72, ABST_SZ = 28, ABST_LH = 44, EN_SZ = 18, EN_LH = 28;
  const tmp = document.createElement('canvas');
  tmp.width = CW; tmp.height = 5000;
  const tc = tmp.getContext('2d');
  const wt = (text, maxW, fStr) => { tc.font = fStr; return wrapText(tc, text, maxW); };
  const titleLines = wt(d.titleZh || '（無標題）', CW_INNER, `700 ${TITLE_SZ}px "Noto Serif TC", serif`);
  const enLines    = (d.titleOrig && d.titleOrig !== d.titleZh) ? wt(d.titleOrig, CW_INNER, `400 ${EN_SZ}px "Noto Sans TC", sans-serif`) : [];
  const absLines   = d.abstract ? wt(d.abstract, CW_INNER, `400 ${ABST_SZ}px "Noto Sans TC", sans-serif`) : [];
  let contentH = 108 + (titleLines.length-1)*TITLE_LH + 44 + 2 + 28;
  if (enLines.length > 0)  contentH += enLines.length  * EN_LH   + 20;
  if (absLines.length > 0) contentH += absLines.length * ABST_LH + 16;
  contentH += 28;
  const CH_dyn = Math.max(HDR + contentH + FTR, 560);
  const canvas = document.getElementById('canvas');
  canvas.width = CW; canvas.height = CH_dyn;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = C.paper; ctx.fillRect(0, 0, CW, CH_dyn);
  ctx.fillStyle = C.ink;  ctx.fillRect(0, 0, CW, HDR);
  ctx.fillStyle = C.gold; ctx.fillRect(0, 0, 6, HDR);
  ctx.font = '700 22px "Noto Sans TC", sans-serif'; ctx.fillStyle = C.gold;
  ctx.fillText((d.source || '木木人分享').toUpperCase(), MX, 42);
  if (d.date) { ctx.font = '400 18px "Noto Sans TC", sans-serif'; ctx.fillStyle = '#8A8AB0'; const label = '文章日期：'+d.date; ctx.fillText(label, CW-MX-ctx.measureText(label).width, 42); }
  ctx.font = '400 16px "Noto Sans TC", sans-serif'; ctx.fillStyle = C.rule; ctx.fillText('醫療生技資訊', MX, 72);
  let y = HDR + 108;
  ctx.font = `700 ${TITLE_SZ}px "Noto Serif TC", serif`; ctx.fillStyle = C.ink;
  for (let i = 0; i < titleLines.length; i++) { ctx.fillText(titleLines[i], MX, y); if (i < titleLines.length-1) y += TITLE_LH; }
  y += 44;
  ctx.strokeStyle = C.gold; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(MX,y); ctx.lineTo(MX+CW_INNER,y); ctx.stroke(); y += 28;
  if (enLines.length > 0) { ctx.font = `400 ${EN_SZ}px "Noto Sans TC", sans-serif`; ctx.fillStyle = C.sage; for (const ln of enLines) { ctx.fillText(ln, MX, y); y += EN_LH; } y += 20; }
  if (absLines.length > 0) { ctx.font = `400 ${ABST_SZ}px "Noto Sans TC", sans-serif`; ctx.fillStyle = C.ink; for (const ln of absLines) { ctx.fillText(ln, MX, y); y += ABST_LH; } }
  const fy = CH_dyn - FTR;
  ctx.fillStyle = C.ink; ctx.fillRect(0, fy, CW, FTR);
  ctx.fillStyle = C.gold; ctx.fillRect(0, fy, 6, FTR);
  if (d.url) { const du = d.url.length > 72 ? d.url.slice(0,72)+'…' : d.url; ctx.font = '400 15px "Noto Sans TC", sans-serif'; ctx.fillStyle = C.footer; ctx.fillText(du, MX, fy+28); }
  const _mf1 = '木木人 分享';
  ctx.font = '500 14px "Noto Sans TC", sans-serif'; ctx.fillStyle = '#E8C87A';
  ctx.fillText(_mf1, CW - MX - LOGO_W - 18 - ctx.measureText(_mf1).width, fy + Math.round(FTR / 2) + 6);
  ctx.save(); ctx.filter = 'brightness(1.25) saturate(1.1)';
  ctx.drawImage(LOGO_IMG, CW - MX - LOGO_W, fy + Math.round((FTR - LOGO_H) / 2), LOGO_W, LOGO_H);
  ctx.restore();
  if (d.titleOrig) { ctx.font = '400 15px "Noto Sans TC", sans-serif'; ctx.fillStyle = '#8A8AB0'; const ol = wrapText(ctx, d.titleOrig, CW_INNER-140); ctx.fillText(ol[0]+(ol.length>1?'…':''), MX, fy+52); }
  return canvas.toDataURL('image/jpeg', 0.92);
}
</script>
<canvas id="canvas" style="display:none" width="1080" height="1350"></canvas>

<div id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>重新產生 JPEG 並傳送至 LINE</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-source" id="modal-source"></div>
        <div class="modal-title-text" id="modal-title"></div>
        <div class="modal-orig-text" id="modal-orig"></div>
        <div style="font-size:11px;color:var(--sage);margin-top:4px;" id="modal-date-text"></div>
      </div>
      <div id="modal-preview">
        <div id="modal-loading" style="text-align:center;padding:24px;color:var(--sage);font-size:13px;">🎨 產生兩張 JPEG 中…</div>
        <div id="modal-dual" style="display:none;">
          <div style="font-size:11px;color:var(--sage);font-weight:700;margin-bottom:6px;">📱 摘要字卡</div>
          <img id="modal-img-summary" alt="摘要字卡" style="max-width:100%;border-radius:6px;border:1px solid var(--border);display:block;margin-bottom:14px;">
          <div style="font-size:11px;color:var(--sage);font-weight:700;margin-bottom:6px;">📄 全文版</div>
          <img id="modal-img-full" alt="全文版" style="max-width:100%;border-radius:6px;border:1px solid var(--border);display:block;">
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-gold" id="modal-send-btn" onclick="modalSendLine()" disabled>📲 傳送至 LINE（兩張）</button>
        <button class="modal-btn modal-btn-outline" onclick="closeModal()">關閉</button>
      </div>
      <div id="modal-status"></div>
    </div>
  </div>
</div>
