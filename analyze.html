<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件盡職調查｜木木人 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #1A1A2E;
  --gold:    #C9A84C;
  --gold-lt: #E8D5A3;
  --paper:   #F5F0E8;
  --cream:   #F0EBE0;
  --sage:    #6B7C6E;
  --border:  #D4C5A0;
  --shadow:  rgba(26,26,46,0.10);
  --green:   #059669;
  --red:     #DC2626;
  --yellow:  #D97706;
  --white:   #FFFFFF;
  --radius:  8px;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── Header ── */
header {
  background: var(--ink);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 3px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-bar { width: 4px; height: 28px; background: var(--gold); border-radius: 2px; }
header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  color: var(--gold-lt);
  letter-spacing: 0.05em;
}
.header-nav { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.header-nav a { font-size: 12px; color: rgba(232,213,163,0.6); text-decoration: none; transition: color 0.15s; }
.header-nav a:hover { color: var(--gold); }

/* ── Layout ── */
.main-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 24px 48px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 900px) { .main-wrap { grid-template-columns: 1fr; } }

.left-col { display: flex; flex-direction: column; gap: 16px; }

/* ── Panel ── */
.panel {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}
.panel-header {
  background: var(--ink);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.step-badge {
  background: var(--gold);
  color: var(--ink);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 100px;
}
.panel-header h2 { font-size: 13px; font-weight: 500; color: var(--gold-lt); }
.panel-body { padding: 16px; }

/* ── Drop Zone ── */
#dropZone {
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--paper);
  position: relative;
}
#dropZone:hover, #dropZone.drag-over {
  border-color: var(--gold);
  background: rgba(201,168,76,0.06);
}
#dropZone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.drop-icon { font-size: 36px; margin-bottom: 8px; }
#dropZone p { font-size: 13px; color: var(--sage); line-height: 1.8; }
#dropZone .hint { font-size: 11px; color: var(--border); margin-top: 4px; }

/* ── File Status ── */
#fileStatus {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(5,150,105,0.08);
  border: 1px solid rgba(5,150,105,0.2);
  border-radius: 6px;
  margin-top: 10px;
}
.file-icon-lg { font-size: 22px; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-count { font-size: 11px; color: var(--sage); margin-top: 2px; }
#clearFile {
  background: none; border: none; cursor: pointer;
  color: var(--sage); font-size: 16px; padding: 4px;
  flex-shrink: 0; border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
#clearFile:hover { color: var(--red); background: rgba(220,38,38,0.08); }

.parse-progress {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; font-size: 12px; color: var(--sage);
  margin-top: 8px;
}

/* ── Warning ── */
.warning-box {
  padding: 8px 12px;
  background: rgba(217,119,6,0.1);
  border: 1px solid rgba(217,119,6,0.3);
  border-radius: 6px;
  font-size: 12px;
  color: #92400E;
}

/* ── Textarea ── */
label.field-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--sage);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
textarea {
  width: 100%;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  resize: vertical;
  transition: border-color 0.2s, background 0.2s;
  line-height: 1.65;
}
textarea:focus { outline: none; border-color: var(--gold); background: var(--white); }
.char-hint { font-size: 11px; color: var(--border); margin-top: 6px; }

/* ── Submit ── */
#submitBtn {
  width: 100%;
  padding: 14px;
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: var(--radius);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s, opacity 0.2s;
  letter-spacing: 0.05em;
}
#submitBtn:hover:not(:disabled) { background: #b8973b; }
#submitBtn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Spinner ── */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(26,26,46,0.3);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Right Col: Empty State ── */
#emptyState {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 64px 32px;
  text-align: center;
  box-shadow: 0 2px 8px var(--shadow);
}
.empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.5; }
#emptyState h3 { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--ink); margin-bottom: 10px; }
#emptyState p { font-size: 13px; color: var(--sage); line-height: 2; }

/* ── Right Col: Loading State ── */
#loadingState {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 64px 32px;
  text-align: center;
  box-shadow: 0 2px 8px var(--shadow);
}
.spinner-lg {
  width: 48px; height: 48px;
  border: 4px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 0 auto 20px;
}
#loadingState h3 { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--ink); margin-bottom: 10px; }
#loadingState p { font-size: 13px; color: var(--sage); }
.loading-phases { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.phase-item {
  font-size: 12px;
  color: rgba(107,124,110,0.5);
  display: flex; align-items: center; gap: 8px;
  transition: color 0.3s;
}
.phase-item.active { color: var(--gold); }
.phase-item.done { color: var(--green); }
.phase-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor; flex-shrink: 0;
}

/* ── Results ── */
#resultsState { display: flex; flex-direction: column; gap: 16px; }

.result-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  padding: 12px 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px var(--shadow);
}
.result-meta { font-size: 12px; color: var(--sage); }
.result-meta strong { color: var(--ink); }

.btn-gold {
  padding: 10px 22px;
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: var(--radius);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.2s;
}
.btn-gold:hover { background: #b8973b; }

/* ── Section Card ── */
.section-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}
.section-header {
  background: var(--ink);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-header .s-icon { font-size: 18px; }
.section-header h3 { font-size: 14px; font-weight: 700; color: var(--gold-lt); flex: 1; }
.risk-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 100px;
  flex-shrink: 0;
}
.risk-high { background: rgba(220,38,38,0.15); color: #FCA5A5; border: 1px solid rgba(220,38,38,0.3); }
.risk-mid  { background: rgba(217,119,6,0.15); color: #FCD34D; border: 1px solid rgba(217,119,6,0.3); }
.risk-low  { background: rgba(5,150,105,0.15); color: #6EE7B7; border: 1px solid rgba(5,150,105,0.3); }

.section-body {
  padding: 20px;
  font-size: 13px;
  line-height: 1.85;
  color: var(--ink);
}
.section-body h2, .section-body h3 { display: none; }
.section-body p { margin-bottom: 10px; }
.section-body strong { font-weight: 700; color: var(--ink); }
.section-body ul, .section-body ol { padding-left: 20px; margin-bottom: 10px; }
.section-body li { margin-bottom: 4px; }
.section-body hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* ── Summary Card ── */
.summary-card {
  background: var(--ink);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}
.summary-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; gap: 10px;
}
.summary-header h3 {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px; font-weight: 700;
  color: var(--gold-lt);
}
.summary-body {
  padding: 20px;
  font-size: 13px;
  line-height: 1.95;
  color: rgba(232,213,163,0.85);
}
.summary-body p { margin-bottom: 10px; }
.summary-body strong { color: var(--gold-lt); }

/* ── Utilities ── */
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo-bar"></div>
  <h1>文件盡職調查系統</h1>
  <nav class="header-nav">
    <a href="/index.html">← 返回首頁</a>
  </nav>
</header>

<div class="main-wrap">
  <!-- Left: Config -->
  <div class="left-col">

    <!-- Upload Panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="step-badge">01</span>
        <h2>上傳文件</h2>
      </div>
      <div class="panel-body">
        <div id="dropZone">
          <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt">
          <div class="drop-icon">📄</div>
          <p>拖曳文件至此，或點擊選擇</p>
          <p class="hint">支援 PDF、Word (.docx)、純文字 (.txt)</p>
        </div>

        <div id="fileStatus" class="hidden">
          <div class="file-icon-lg" id="fileIcon">📄</div>
          <div class="file-info">
            <div class="file-name" id="fileName"></div>
            <div class="char-count" id="charCount"></div>
          </div>
          <button id="clearFile" title="移除文件">✕</button>
        </div>

        <div id="parseProgress" class="parse-progress hidden">
          <div class="spinner show"></div>
          <span>解析文件中...</span>
        </div>

        <div id="lengthWarning" class="warning-box hidden" style="margin-top:10px">
          ⚠️ 文件超過 10 萬字，分析可能耗時較長或需分段處理
        </div>
      </div>
    </div>

    <!-- Goal Panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="step-badge">02</span>
        <h2>分析重點</h2>
      </div>
      <div class="panel-body">
        <label class="field-label" for="analysisGoal">請說明您想分析的重點</label>
        <textarea id="analysisGoal" rows="5"
          placeholder="例如：評估公司財務是否符合增資條件，重點關注資本結構與負債比例。

或：檢視合約是否存在對大股東不利的條款。"></textarea>
        <div class="char-hint">可不填，系統將進行全面盡職調查評估</div>
      </div>
    </div>

    <!-- Submit -->
    <button id="submitBtn" disabled>
      <div class="spinner" id="btnSpinner"></div>
      <span id="btnText">🔍 開始分析</span>
    </button>

  </div><!-- /left-col -->

  <!-- Right: Results -->
  <div class="right-col">

    <!-- Empty State -->
    <div id="emptyState">
      <div class="empty-icon">📋</div>
      <h3>準備開始分析</h3>
      <p>上傳文件並填寫分析重點後<br>系統將從法律、公司經營、財務<br>三個面向進行完整盡職調查</p>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden">
      <div class="spinner-lg"></div>
      <h3>正在分析中...</h3>
      <p>Claude AI 正在審視文件</p>
      <div class="loading-phases">
        <div class="phase-item" id="phase1"><div class="phase-dot"></div> 讀取文件內容</div>
        <div class="phase-item" id="phase2"><div class="phase-dot"></div> 法律面分析</div>
        <div class="phase-item" id="phase3"><div class="phase-dot"></div> 公司經營面分析</div>
        <div class="phase-item" id="phase4"><div class="phase-dot"></div> 財務面分析</div>
        <div class="phase-item" id="phase5"><div class="phase-dot"></div> 撰寫執行摘要</div>
      </div>
    </div>

    <!-- Results State -->
    <div id="resultsState" class="hidden">

      <div class="result-topbar">
        <div class="result-meta" id="resultMeta"></div>
        <button class="btn-gold" id="pdfBtn">📄 生成正式報告</button>
      </div>

      <div class="section-card">
        <div class="section-header">
          <span class="s-icon">⚖️</span>
          <h3>法律面分析</h3>
          <span class="risk-badge" id="riskLegal"></span>
        </div>
        <div class="section-body" id="contentLegal"></div>
      </div>

      <div class="section-card">
        <div class="section-header">
          <span class="s-icon">🏢</span>
          <h3>公司經營面分析</h3>
          <span class="risk-badge" id="riskOps"></span>
        </div>
        <div class="section-body" id="contentOps"></div>
      </div>

      <div class="section-card">
        <div class="section-header">
          <span class="s-icon">💰</span>
          <h3>財務面分析</h3>
          <span class="risk-badge" id="riskFin"></span>
        </div>
        <div class="section-body" id="contentFin"></div>
      </div>

      <div class="summary-card">
        <div class="summary-header">
          <span>📌</span>
          <h3>執行摘要</h3>
        </div>
        <div class="summary-body" id="contentSummary"></div>
      </div>

    </div><!-- /resultsState -->

  </div><!-- /right-col -->
</div><!-- /main-wrap -->

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let documentText = '';
let currentFileName = '';

/* ── File Upload ── */
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const fileStatus  = document.getElementById('fileStatus');
const fileIcon    = document.getElementById('fileIcon');
const fileName    = document.getElementById('fileName');
const charCount   = document.getElementById('charCount');
const clearFile   = document.getElementById('clearFile');
const parseProgress = document.getElementById('parseProgress');
const lengthWarning = document.getElementById('lengthWarning');
const submitBtn   = document.getElementById('submitBtn');
const btnSpinner  = document.getElementById('btnSpinner');
const btnText     = document.getElementById('btnText');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
clearFile.addEventListener('click', resetFile);

async function handleFile(file) {
  dropZone.classList.add('hidden');
  fileStatus.classList.add('hidden');
  parseProgress.classList.remove('hidden');
  documentText = '';
  currentFileName = file.name;

  try {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'pdf') {
      documentText = await parsePDF(file);
      fileIcon.textContent = '📕';
    } else if (ext === 'docx' || ext === 'doc') {
      documentText = await parseDOCX(file);
      fileIcon.textContent = '📘';
    } else {
      documentText = await file.text();
      fileIcon.textContent = '📄';
    }

    parseProgress.classList.add('hidden');
    fileStatus.classList.remove('hidden');
    fileName.textContent = file.name;
    charCount.textContent = `已讀取 ${documentText.length.toLocaleString()} 字元`;
    lengthWarning.classList.toggle('hidden', documentText.length <= 100000);
    submitBtn.disabled = false;
  } catch (err) {
    parseProgress.classList.add('hidden');
    dropZone.classList.remove('hidden');
    alert('無法解析此文件：' + err.message);
  }
}

async function parsePDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    pages.push(content.items.map(item => item.str).join(' '));
  }
  return pages.join('\n\n');
}

async function parseDOCX(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer });
  return result.value;
}

function resetFile() {
  documentText = '';
  currentFileName = '';
  fileInput.value = '';
  fileStatus.classList.add('hidden');
  lengthWarning.classList.add('hidden');
  dropZone.classList.remove('hidden');
  submitBtn.disabled = true;
}

/* ── Analysis ── */
submitBtn.addEventListener('click', runAnalysis);

async function runAnalysis() {
  if (!documentText) return;

  submitBtn.disabled = true;
  btnSpinner.classList.add('show');
  btnText.textContent = '分析中...';

  showPanel('loading');
  startPhaseAnimation();

  try {
    const analysisGoal = document.getElementById('analysisGoal').value;
    const rawText = await streamAnalysis(documentText.slice(0, 120000), analysisGoal);
    renderResults(rawText, analysisGoal);
    showPanel('results');
  } catch (err) {
    showPanel('empty');
    alert('分析失敗：' + err.message);
  } finally {
    submitBtn.disabled = false;
    btnSpinner.classList.remove('show');
    btnText.textContent = '🔍 開始分析';
  }
}

async function streamAnalysis(text, goal) {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ documentText: text, analysisGoal: goal }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'API 錯誤' }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const evt = JSON.parse(data);
        if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
          fullText += evt.delta.text;
          updatePhaseFromText(fullText);
        }
      } catch (_) {}
    }
  }
  return fullText;
}

/* ── Phase Animation ── */
let phaseTimer = null;

function startPhaseAnimation() {
  const phases = ['phase1','phase2','phase3','phase4','phase5'];
  phases.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
  });
  document.getElementById('phase1').classList.add('active');
}

function updatePhaseFromText(text) {
  const setPhase = (id, state) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('active','done');
    if (state) el.classList.add(state);
  };

  setPhase('phase1','done');

  if (text.includes('法律面分析')) setPhase('phase2','active');
  if (text.includes('公司經營面分析')) { setPhase('phase2','done'); setPhase('phase3','active'); }
  if (text.includes('財務面分析'))     { setPhase('phase3','done'); setPhase('phase4','active'); }
  if (text.includes('執行摘要'))       { setPhase('phase4','done'); setPhase('phase5','active'); }
}

/* ── Render Results ── */
function parseSections(text) {
  const result = { legal:'', ops:'', fin:'', summary:'' };
  const parts = text.split(/^## /m);
  for (const part of parts) {
    if (!part.trim()) continue;
    const idx = part.indexOf('\n');
    const title   = part.slice(0, idx).trim();
    const content = part.slice(idx + 1).trim();
    if (title.includes('法律'))     result.legal   = content;
    else if (title.includes('經營')) result.ops     = content;
    else if (title.includes('財務')) result.fin     = content;
    else if (title.includes('摘要')) result.summary = content;
  }
  return result;
}

function extractRisk(content) {
  const m = content.match(/\*\*風險等級[：:]\*\*\s*([高中低])/);
  return m ? m[1] : null;
}

function setRiskBadge(el, level) {
  if (!level) { el.textContent = ''; return; }
  el.textContent = `風險：${level}`;
  el.classList.remove('risk-high','risk-mid','risk-low');
  if (level === '高') el.classList.add('risk-high');
  else if (level === '中') el.classList.add('risk-mid');
  else el.classList.add('risk-low');
}

function renderMarkdown(content) {
  // Strip the section header line if it matches standard headers
  const stripped = content
    .replace(/^\*\*風險等級[：:]\*\*.*\n?/, '')
    .trim();
  return marked.parse(stripped);
}

function renderResults(rawText, goal) {
  const sections = parseSections(rawText);
  const date = new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });

  document.getElementById('resultMeta').innerHTML =
    `<strong>${currentFileName}</strong> &nbsp;·&nbsp; ${date}` +
    (goal ? ` &nbsp;·&nbsp; ${goal.slice(0,40)}${goal.length>40?'…':''}` : '');

  document.getElementById('contentLegal').innerHTML   = renderMarkdown(sections.legal);
  document.getElementById('contentOps').innerHTML     = renderMarkdown(sections.ops);
  document.getElementById('contentFin').innerHTML     = renderMarkdown(sections.fin);
  document.getElementById('contentSummary').innerHTML = marked.parse(sections.summary);

  setRiskBadge(document.getElementById('riskLegal'), extractRisk(sections.legal));
  setRiskBadge(document.getElementById('riskOps'),   extractRisk(sections.ops));
  setRiskBadge(document.getElementById('riskFin'),   extractRisk(sections.fin));

  // Store for PDF
  window._reportData = { sections, rawText, goal, date, fileName: currentFileName };
}

/* ── Panel Switch ── */
function showPanel(name) {
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('resultsState').classList.add('hidden');
  if (name === 'empty')   document.getElementById('emptyState').classList.remove('hidden');
  if (name === 'loading') document.getElementById('loadingState').classList.remove('hidden');
  if (name === 'results') document.getElementById('resultsState').classList.remove('hidden');
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
